services:
  - type: web
    name: et-site
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn et_site.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Nixpacks (used for some Python builds) ignores PYTHON_VERSION; set explicitly.
      - key: NIXPACKS_PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: et-db
          property: connectionString

databases:
  - name: et-db
    plan: free