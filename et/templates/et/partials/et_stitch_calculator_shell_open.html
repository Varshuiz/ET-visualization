<div class="flex min-h-screen bg-background">
    {% include 'et/partials/stitch_sidebar.html' with sidebar_active='et_analysis' %}

    <main class="ml-[260px] flex-1 flex flex-col min-h-screen">
        <header class="w-full min-h-[180px] flex flex-col justify-end relative overflow-hidden shadow-sm p-8" style="background-color: #2D6A6A;">
            <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 24px 24px;"></div>
            <div class="relative z-10 max-w-4xl">
                <span class="text-xs font-bold tracking-widest uppercase text-[#c2e4da]/80">ET Analysis</span>
                <h1 class="text-3xl md:text-4xl font-bold text-white mt-2 mb-2 flex items-center gap-3 flex-wrap">
                    {% if calc_icon %}<span class="material-symbols-outlined text-4xl">{{ calc_icon }}</span>{% endif %}
                    {{ calc_title }}
                </h1>
                <p class="text-[#abe8e7]/90 text-base">{{ calc_subtitle }}</p>
            </div>
        </header>

        <div class="p-8 max-w-5xl w-full mx-auto flex-1 space-y-6">
