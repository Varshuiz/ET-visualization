<!DOCTYPE html>
<html>
<head>
    <title>ET Upload Tool</title>
</head>
<body>
    <h1>Upload ACIS Weather Data CSV</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>

    {% if et_data %}
        <h2>Computed ET Values</h2>
        <table border="1">
            <tr>
                <th>Date</th>
                <th>ET₀(mm/day)</th>
            </tr>
            {% for row in et_data %}
            <tr>
                <td>{{ row.Date|date:"Y-m-d" }}</td>

                <td>{{ row.ET|floatformat:2 }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}
</body>
</html>
