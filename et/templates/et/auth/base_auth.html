{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c5252">
    <title>{% block title %}AqualET{% endblock %}</title>
    <style>
        :root {
            --auth-bg: #f8faf9;
            --auth-primary: #0c5252;
            --auth-primary-hover: #2d6a6a;
            --auth-on-surface: #191c1c;
            --auth-muted: #3f4848;
            --auth-outline: #707978;
            --auth-border: #bfc8c8;
            --auth-card: #ffffff;
            --auth-error-bg: #fef2f2;
            --auth-error-border: #fecaca;
            --auth-error-text: #991b1b;
            --auth-info-bg: rgba(12, 82, 82, 0.05);
            --auth-info-border: rgba(12, 82, 82, 0.3);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body.auth-page {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--auth-bg);
            color: var(--auth-on-surface);
            -webkit-font-smoothing: antialiased;
        }
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
        }
        .auth-grid {
            width: 100%;
            max-width: 64rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            align-items: center;
        }
        @media (min-width: 768px) {
            .auth-grid {
                grid-template-columns: 1fr 1fr;
                gap: 4rem;
            }
            .auth-brand-col { text-align: left; align-items: flex-start; }
            .auth-card-col { justify-self: end; max-width: 28rem; width: 100%; }
        }
        .auth-brand-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.25rem;
        }
        .auth-brand-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }
        @media (min-width: 768px) {
            .auth-brand-block { align-items: flex-start; }
        }
        .auth-logo {
            width: 7rem;
            height: 7rem;
            border-radius: 1rem;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(9, 82, 86, 0.12);
            outline: 4px solid #fff;
        }
        @media (min-width: 768px) {
            .auth-logo { width: 8rem; height: 8rem; }
        }
        .auth-product-title {
            margin: 0;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            color: var(--auth-primary);
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .auth-product-tagline {
            margin: 0.75rem 0 0;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--auth-muted);
            letter-spacing: 0.04em;
        }
        @media (min-width: 768px) {
            .auth-product-tagline { font-size: 1rem; }
        }
        .auth-blurb {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--auth-muted);
            max-width: 28rem;
        }
        @media (min-width: 768px) {
            .auth-blurb { font-size: 1.125rem; }
        }
        .auth-card {
            background: var(--auth-card);
            border-radius: 1rem;
            border: 1px solid var(--auth-border);
            box-shadow: 0 20px 40px rgba(9, 82, 86, 0.08);
            padding: 2rem;
            width: 100%;
        }
        .auth-card h2 {
            margin: 0 0 0.25rem;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .auth-card .auth-subtitle {
            margin: 0 0 1.5rem;
            font-size: 0.875rem;
            color: var(--auth-muted);
        }
        .auth-banner {
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }
        .auth-banner-error {
            background: var(--auth-error-bg);
            border: 1px solid var(--auth-error-border);
            color: var(--auth-error-text);
        }
        .auth-banner-info {
            background: var(--auth-info-bg);
            border: 1px solid var(--auth-info-border);
            color: var(--auth-primary);
        }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; }
        .auth-field label {
            display: block;
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--auth-outline);
            margin-bottom: 0.375rem;
        }
        .auth-field label .required { color: #ef4444; }
        .auth-form input[type="email"],
        .auth-form input[type="password"],
        .auth-form input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--auth-border);
            font-size: 0.95rem;
            background: #fff;
            color: var(--auth-on-surface);
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--auth-primary);
            box-shadow: 0 0 0 2px rgba(12, 82, 82, 0.15);
        }
        .auth-submit {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            background: var(--auth-primary);
            color: #fff;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(12, 82, 82, 0.25);
        }
        .auth-submit:hover { background: var(--auth-primary-hover); }
        .auth-submit:disabled { opacity: 0.65; cursor: wait; }
        .auth-switch {
            margin: 1rem 0 0;
            text-align: center;
            font-size: 0.875rem;
            color: var(--auth-muted);
        }
        .auth-switch a {
            color: var(--auth-primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-switch a:hover { text-decoration: underline; }
        .auth-footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            color: var(--auth-muted);
        }
        .auth-field-errors {
            margin-top: 0.375rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 0.5rem;
            background: var(--auth-error-bg);
            border: 1px solid var(--auth-error-border);
            color: var(--auth-error-text);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="auth-page">
    {% block content %}{% endblock %}
    <footer class="auth-footer">© 2026 Dr. Evan Davies &amp; Smriti Mohapatra</footer>
    <script>
        document.querySelectorAll('form[data-loading-text]').forEach(function (form) {
            form.addEventListener('submit', function () {
                var btn = form.querySelector('.auth-submit');
                if (btn) {
                    btn.disabled = true;
                    var t = form.getAttribute('data-loading-text');
                    if (t) btn.textContent = t;
                }
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
